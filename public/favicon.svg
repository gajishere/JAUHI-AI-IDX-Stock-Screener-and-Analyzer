<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- JA monogram — a J hooks into an A whose right leg reads as a forward
       growth arrow. Theme-adaptive: light = dark mark on light tile,
       dark = light mark on dark tile. Each branch sets a solid rounded tile
       (favicons over non-square canvases look ragged) + the mark on top. -->
  <style>
    .t { display: none; }
    @media (prefers-color-scheme: light)  { .light  { display: inline; } }
    @media (prefers-color-scheme: dark)   { .dark   { display: inline; } }
    @media print { .light { display: inline; } }
  </style>

  <!-- LIGHT THEME -->
  <g class="light t">
    <rect width="64" height="64" rx="14" fill="#ffffff"/>
    <rect x="0.75" y="0.75" width="62.5" height="62.5" rx="13.25" fill="none" stroke="#e6e8ea" stroke-width="1.5"/>
    <g fill="#16181c">
      <!-- J: stem + bottom hook -->
      <path d="M14 11h9v30c0 5.2-3.3 8.4-9.2 8.4-4.1 0-7.2-1.9-8.9-5.4l6.9-3.9c.7 1.4 1.4 2 2.5 2 1.5 0 2.6-1.1 2.6-2.9V11z"/>
      <!-- A: left leg + crossbar -->
      <path d="M25 50h-8.7L26.4 22c1-2.8 3.7-4.6 6.7-4.6h2.9c3 0 5.7 1.8 6.7 4.6L51.5 50h-8.7l-1.7-4.8H30.4L25 50zm6.6-12h9.9L36.2 23.6 31.6 38z"/>
    </g>
  </g>

  <!-- DARK THEME -->
  <g class="dark t">
    <rect width="64" height="64" rx="14" fill="#0d0f12"/>
    <rect x="0.75" y="0.75" width="62.5" height="62.5" rx="13.25" fill="none" stroke="#2f353d" stroke-width="1.5"/>
    <g fill="#eef1f4">
      <path d="M14 11h9v30c0 5.2-3.3 8.4-9.2 8.4-4.1 0-7.2-1.9-8.9-5.4l6.9-3.9c.7 1.4 1.4 2 2.5 2 1.5 0 2.6-1.1 2.6-2.9V11z"/>
      <path d="M25 50h-8.7L26.4 22c1-2.8 3.7-4.6 6.7-4.6h2.9c3 0 5.7 1.8 6.7 4.6L51.5 50h-8.7l-1.7-4.8H30.4L25 50zm6.6-12h9.9L36.2 23.6 31.6 38z"/>
    </g>
  </g>
</svg>
