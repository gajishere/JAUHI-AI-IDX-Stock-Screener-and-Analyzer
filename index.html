<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicon: an SVG with a built-in prefers-color-scheme swap, plus PNG
         fallbacks for the browsers/contexts that don't render SVG favicons. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=2" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png?v=2" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=2" />
    <link rel="mask-icon" href="/favicon.svg?v=2" color="#13b87a" />
    <!-- OS chrome follows the active theme. Two meta tags + a media query let
         the address bar/bookmark chrome match light or dark automatically. -->
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0d0f12" media="(prefers-color-scheme: dark)" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>IDX Stock Analysis & Screening</title>
    <!-- Social preview — the JA mark on a brand-tinted card. -->
    <meta property="og:title" content="IDX Stock Analysis & Screening" />
    <meta property="og:description" content="Indonesia Stock Exchange · flow research desk" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/og-image.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Inter (Cosmoq display + body) on a true contrast axis with IBM Plex Mono
         for the figures. Inter's optical sizing + tight tracking gives the big
         headings their next-gen, tech-product voice. -->
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <script>
      // Apply the persisted (or system) theme before paint to avoid a flash.
      (function () {
        try {
          var saved = localStorage.getItem('idx-theme');
          var dark = saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
          document.documentElement.style.colorScheme = dark ? 'dark' : 'light';
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

</body>
</html>
