name: IDX Auto-Screen

# Fires the live auto-screener at each fixed WIB clock slot by POSTing the
# token-protected Vercel run endpoint. The endpoint self-guards on the WIB
# schedule, so cron drift (GitHub can be a few minutes late) is tolerated.
#
# GitHub cron is UTC; WIB = UTC+7. The trading window 08:00–16:00 WIB maps to
# 01:00–09:00 UTC. We fire every 15 minutes across that window rather than once
# per slot, because GitHub's scheduled runners are frequently delayed 10–40 min
# (and occasionally drop a run) — the top-of-hour batch most of all. A single
# on-the-hour cron therefore kept MISSING the 08:00 pre-market scan.
#
# The endpoint is drift-tolerant: each scan slot "owns" the time until the next
# slot, so whichever tick lands first inside a slot's window runs that slot's
# scan, and the rest dedup to a cheap no-op (already-scanned-this-slot). This
# turns flaky cron timing into "at least one of four ticks per slot will fire."
#
# Setup (one-time):
#   - Repo secret  AUTO_SCREEN_TOKEN  = same value as the Vercel env var.
#   - Repo variable AUTO_SCREEN_URL   = deployment base, e.g. https://your-app.vercel.app

on:
  schedule:
    - cron: '*/15 1-8 * * 1-5' # every 15 min, 08:00–15:59 WIB (01:00–08:59 UTC), Mon–Fri
  workflow_dispatch:
    inputs:
      force:
        description: 'Run even if outside a scan slot (testing)'
        type: boolean
        default: false

concurrency:
  group: auto-screen
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger auto-screen run
        env:
          BASE_URL: ${{ vars.AUTO_SCREEN_URL }}
          TOKEN: ${{ secrets.AUTO_SCREEN_TOKEN }}
          FORCE: ${{ github.event.inputs.force }}
        run: |
          if [ -z "$BASE_URL" ] || [ -z "$TOKEN" ]; then
            echo "::error::AUTO_SCREEN_URL (repo variable) and AUTO_SCREEN_TOKEN (repo secret) must be set."
            exit 1
          fi
          QS=""
          if [ "$FORCE" = "true" ]; then QS="?force=1"; fi
          echo "POST $BASE_URL/api/auto-screen-run$QS"
          curl -fsS --max-time 90 -X POST \
            -H "Authorization: Bearer $TOKEN" \
            "$BASE_URL/api/auto-screen-run$QS"
